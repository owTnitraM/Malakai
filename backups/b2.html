<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teste</title>

  <style>
    body {
      background: #0e0e11;
      color: #f1f1f1;
      font-family: system-ui, sans-serif;
      display: flex;
      justify-content: center;
      padding: 40px;
    }

    .sheet {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      max-width: 900px;
      width: 100%;
    }

    .field {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .field input {
      background: transparent;
      border: none;
      border-bottom: 1px solid #444;
      color: #fff;
      text-align: center;
      font-size: 1rem;
      padding: 6px 0;
      width: 100%;
      outline: none;
    }

    .field span {
      margin-top: 6px;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #aaa;
    }

    @media (max-width: 768px) {
      .sheet {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 480px) {
      .sheet {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="sheet">
    <div class="field"><input type="text"><span>Nome</span></div>
    <div class="field"><input type="text"><span>Classe e Nível</span></div>
    <div class="field"><input type="text"><span>Raça</span></div>
    <div class="field"><input type="text"><span>Antecedente</span></div>
    <div class="field"><input type="text"><span>Tendência</span></div>
    <div class="field"><input type="text"><span>Jogador</span></div>
  </div>
</body>
</html>
