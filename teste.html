<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100..700;1,100..700&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap"
        rel="stylesheet">
    <style>
        .checkbox-wrapper {
            position: relative;
            width: 24px;
            height: 24px;
        }

        /* O segredo: o input invisível fica por cima de tudo */
        .native-input {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
            z-index: 2;
            /* Garante que o clique atinja o input */
            margin: 0;
        }

        /* O quadrado (borda) */
        .visual-box {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 2px solid #333;
            background-color: white;
            z-index: 1;
            /* Fica atrás do input invisível */
            box-sizing: border-box;
        }

        /* O preenchimento quadrado interno */
        .visual-box::after {
            content: "";
            position: absolute;
            top: 2px;
            left: 2px;
            right: 2px;
            bottom: 2px;
            background-color: orangered;
            opacity: 0;
            /* Escondido por padrão */
            transition: opacity 0.1s ease;
        }

        /* Quando o input (que está por cima) for marcado, mostra o preenchimento no span (que está atrás) */
        .native-input:checked~.visual-box::after {
            opacity: 1;
        }

        /* Opcional: muda a borda quando marcado */
        .native-input:checked~.visual-box {
            /* border-color: #2196F3; */
        }
    </style>
    <title>Ficha RPG</title>
</head>

<body>
    <div class="checkbox-wrapper">
        <input type="checkbox" class="native-input">
        <span class="visual-box"></span>
    </div>
</body>

</html>
