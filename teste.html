<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100..700;1,100..700&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap"
        rel="stylesheet">
    <style>
        .barra-navegacao {
            display: flex;
            /* Distribui o espaço igualmente entre os itens */
            justify-content: space-between;
            /* Alinha verticalmente ao centro */
            align-items: center;

            /* Distância das bordas para não encostarem nas laterais */
            padding: 0 20px;

            height: 60px;
            background-color: #f4f4f4;

            /* Garante que o item do meio fique exatamente no centro real, 
     mesmo que os textos laterais tenham tamanhos diferentes */
        }

        .item {
            flex: 1;
            /* Faz com que todos ocupem o mesmo espaço base */
        }

        .centro {
            text-align: center;
            font-weight: bold;
        }

        .item:last-child {
            text-align: right;
        }

        /* Responsividade: Em telas muito pequenas, você pode ajustar o padding */
        @media (max-width: 480px) {
            .barra-navegacao {
                padding: 0 10px;
                font-size: 14px;
            }
        }
    </style>
    <title>Ficha RPG</title>
</head>

<body>
    <div class="barra-navegacao">
        <div class="item">Esquerda</div>
        <div class="item centro">Centralizado</div>
        <div class="item">Direita</div>
    </div>


</body>

</html>
