<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100..700;1,100..700&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap"
        rel="stylesheet">
    <style>
        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, auto);
            /* 3 linhas automáticas */
            gap: 15px;
            /* O "mapa" do seu layout: */
            grid-template-areas:
                "A A A"
                /* Item 1: 3 colunas */
                "B B C"
                /* Item 2: 2 colunas | Item 3: começa aqui */
                "D E C";
            /* Item 4 | Item 5 | Item 3: termina aqui */
        }

        /* Atribui cada item à sua letra no mapa */
        .item-1 {
            grid-area: A;
        }

        .item-2 {
            grid-area: B;
        }

        .item-3 {
            grid-area: C;
        }

        .item-4 {
            grid-area: D;
        }

        .item-5 {
            grid-area: E;
        }

        /* Estilo visual base */
        .grid-container>div {
            background: #1a1a1a;
            color: white;
            padding: 20px;
            text-align: center;
            border: 1px solid #333;
        }
    </style>
    <title>Ficha RPG</title>
</head>

<body>
    <div class="grid-container">
        <div class="item-1">1 (3 Colunas / Row 1)</div>
        <div class="item-2">2 (2 Colunas / Row 2)</div>
        <div class="item-3">3 (1 Coluna / Row 2)</div>
        <div class="item-4">4 (1 Coluna / Row 3)</div>
        <div class="item-5">5 (1 Coluna / 2 Rows de altura)</div>
    </div>


</body>

</html>
